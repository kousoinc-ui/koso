    <style>
        .lp-wrapper {
            position: relative;
            width: 100%;
            max-width: 750px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .fv-container {
            position: relative;
            width: 100%;
        }

        .fv-img {
            display: block;
            width: 100%;
            height: auto;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .overlay-img1 {
            position: absolute;
            top: 15%;
            left: 4%;
            width: 27%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            animation: fadeIn 1s ease 0.5s both;
        }

        .overlay-img2 {
            position: absolute;
            top: 15%;
            left: 30%;
            width: 27%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            animation: fadeIn 1s ease 0.5s both;
        }

        .overlay-img3 {
            position: absolute;
            top: 70%;
            left: 78%;
            width: 21%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            animation: fadeIn 1s ease 1.5s both;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        .cvbtn {
            position: absolute;
            top: 87%;
            left: 5%;
            width: 90%;
            height: auto;
            z-index: 10;
            transform-origin: center;
            animation: pulse 2s ease-in-out 1s infinite;
        }

        .cvbtn img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 🔴 wankosoad12用のコンテナを設定 */
        .wankosoad12-container {
            position: relative;
            width: 100%;
        }

        /* 🔴 cvbtn_2 の位置を調整（topの数値で上下に動かせます） */
        .cvbtn_2 {
            position: absolute;
            top: 75%;
            /* 画像の下寄りに配置（※ボタンを上げたい場合は数値を減らし、下げたい場合は増やしてください） */
            left: 5%;
            width: 90%;
            height: auto;
            z-index: 10;
            transform-origin: center;
            animation: pulse 2s ease-in-out 1s infinite;
        }

        .cvbtn_2 img {
            width: 100%;
            height: auto;
            display: block;
        }

        .product-container {
            position: relative;
            width: 100%;
        }

        .product-img {
            display: block;
            width: 100%;
            height: auto;
        }

        .wankosoad3-container {
            position: relative;
            width: 100%;
        }

        .overlay-omoi {
            position: absolute;
            top: 2%;
            left: 5%;
            width: 90%;
        }

        .wankosoad5-container {
            position: relative;
            width: 100%;
        }

        .overlay-hakko {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 85%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 0.5s, transform 1.2s ease;
        }

        .overlay-hakko.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .wankosoad6-container {
            position: relative;
            width: 100%;
        }

        .overlay-cmt1 {
            position: absolute;
            top: 72.5%;
            left: 4%;
            width: 28%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease 0.8s, transform 1.2s ease;
        }

        .overlay-cmt1.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .overlay-cmt2 {
            position: absolute;
            top: 50%;
            left: 62%;
            width: 29%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease 1.5s, transform 1.2s ease 0.3s;
        }

        .overlay-cmt2.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .wankosoad7-container {
            position: relative;
            width: 100%;
        }

        .overlay-hakko_3 {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 90%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 4.5s, transform 1.2s ease;
        }

        .overlay-hakko_2 {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 60%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 2.5s, transform 1.2s ease;
        }

        .overlay-hakko_2.is-visible,
        .overlay-hakko_3.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .overlay-wankoso {
            position: absolute;
            top: 65%;
            left: 66%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 85%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 3.5s, transform 1.2s ease;
        }

        .overlay-wankoso.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .wankosoad8-container {
            position: relative;
            width: 100%;
        }

        .overlay-hakko_4 {
            position: absolute;
            top: 34%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 90%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 2s, transform 1.2s ease;
        }

        .overlay-hakko_4.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .points-container {
            position: relative;
            width: 100%;
        }

        .points-container img {
            display: block;
            width: 100%;
            height: auto;
        }

        .wankosoad9-container {
            position: relative;
            width: 100%;
        }

        .wankosoad9-container img {
            display: block;
            width: 100%;
            height: auto;
        }

        .overlay-step {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 75%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 1s, transform 1.2s ease;
        }

        .overlay-step.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .wankosoad10-container {
            position: relative;
            width: 100%;
        }

        .overlay-review_top {
            position: absolute;
            top: 9%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 75%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 0.5s, transform 1.2s ease;
        }

        .overlay-review_1 {
            position: absolute;
            top: 61%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 53%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 1.2s, transform 1.2s ease;
        }

        .overlay-review_top.is-visible,
        .overlay-review_1.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        /* 🔴 wankosoad13用コンテナ（他と統一） */
        .wankosoad13-container {
            position: relative;
            width: 100%;
        }
    </style>

    <script>
        // hagumi（overlay-img3）スクロールフェードイン
        var img3 = document.querySelector('.overlay-img3');
        if (img3) {
            function checkImg3() {
                var rect = img3.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    img3.classList.add('is-visible');
                    window.removeEventListener('scroll', checkImg3);
                }
            }
            window.addEventListener('scroll', checkImg3, { passive: true });
        }

        // omoi_txt（overlay-omoi）スクロールフェードイン
        var omoi = document.querySelector('.overlay-omoi');
        if (omoi) {
            function checkOmoi() {
                var rect = omoi.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    omoi.classList.add('is-visible');
                    window.removeEventListener('scroll', checkOmoi);
                }
            }
            window.addEventListener('scroll', checkOmoi, { passive: true });
        }

        // hakko（overlay-hakko）スクロールフェードイン
        var hakko = document.querySelector('.overlay-hakko');
        if (hakko) {
            function checkHakko() {
                var rect = hakko.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    hakko.classList.add('is-visible');
                    window.removeEventListener('scroll', checkHakko);
                }
            }
            window.addEventListener('scroll', checkHakko, { passive: true });
        }

        // cmt1 & cmt2スクロールフェードイン
        var cmt1 = document.querySelector('.overlay-cmt1');
        var cmt2 = document.querySelector('.overlay-cmt2');
        if (cmt1 || cmt2) {
            function checkCmts() {
                var target = cmt1 || cmt2;
                var rect = target.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    if (cmt1) cmt1.classList.add('is-visible');
                    if (cmt2) cmt2.classList.add('is-visible');
                    window.removeEventListener('scroll', checkCmts);
                }
            }
            window.addEventListener('scroll', checkCmts, { passive: true });
        }

        // hakko_2, hakko_3 & wankoso スクロールフェードイン
        var hakko2 = document.querySelector('.overlay-hakko_2');
        var hakko3 = document.querySelector('.overlay-hakko_3');
        var wankoso = document.querySelector('.overlay-wankoso');
        if (hakko2 || hakko3 || wankoso) {
            function checkWanko7() {
                var target = hakko2 || hakko3 || wankoso;
                var rect = target.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    if (hakko2) hakko2.classList.add('is-visible');
                    if (hakko3) hakko3.classList.add('is-visible');
                    if (wankoso) wankoso.pragma;
                    if (wankoso) wankoso.classList.add('is-visible');
                    window.removeEventListener('scroll', checkWanko7);
                }
            }
            window.addEventListener('scroll', checkWanko7, { passive: true });
        }

        // hakko_4 スクロールフェードイン
        var hakko4 = document.querySelector('.overlay-hakko_4');
        if (hakko4) {
            function checkHakko4() {
                var rect = hakko4.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    hakko4.classList.add('is-visible');
                    window.removeEventListener('scroll', checkHakko4);
                }
            }
            window.addEventListener('scroll', checkHakko4, { passive: true });
        }

        // overlay-step（step_1）スクロールフェードイン
        var step = document.querySelector('.overlay-step');
        if (step) {
            function checkStep() {
                var rect = step.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    step.classList.add('is-visible');
                    window.removeEventListener('scroll', checkStep);
                }
            }
            window.addEventListener('scroll', checkStep, { passive: true });
        }

        // review_top & review_1 スクロールフェードイン
        var rTop = document.querySelector('.overlay-review_top');
        var rOne = document.querySelector('.overlay-review_1');
        if (rTop || rOne) {
            function checkReviews() {
                var target = rTop || rOne;
                var rect = target.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    if (rTop) rTop.classList.add('is-visible');
                    if (rOne) rOne.classList.add('is-visible');
                    window.removeEventListener('scroll', checkReviews);
                }
            }
            window.addEventListener('scroll', checkReviews, { passive: true });
        }
    </script>
</body>
