<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="lp-wrapper">
        <div class="fv-container">
            <!-- 背景画像（コンテナの高さを決める基準） -->
            <img src="./img/wankosoad1.webp" alt="" class="fv-img">

            <img src="./img/award1.png" alt="makuake350%達成" class="overlay-img1">
            <img src="./img/award2.png" alt="累計販売10000包突破" class="overlay-img2">
            <img src="./img/hagumi.png" alt="はぐみ酵素もプレゼント" class="overlay-img3">
            <a href="https://jfjg1u-sk.myshopify.com/collections/corohug" class="cvbtn">
                <img src="./img/cvbtn.png" alt="ご購入はこちら">
            </a>
        </div>
        <div class="product-container">
            <img src="./img/wankosoad2.webp" class="product-img">
            <div class="wankosoad3-container">
                <img src="./img/wankosoad3.webp" class="product-img">
                <img src="./img/omoi_txt.png" alt="想い" class="overlay-omoi">
            </div>
            <img src="./img/wankosoad4.webp" class="product-img">
            <div class="wankosoad5-container">
                <img src="./img/wankosoad5.webp" class="product-img">
                <img src="./img/hakko.png" alt="発酵" class="overlay-hakko">
            </div>
            <div class="wankosoad6-container">
                <img src="./img/wankosoad6.webp" class="product-img">
                <img src="./img/cmt_1.png" alt="コメント" class="overlay-cmt1">
                <img src="./img/cmt_2.png" alt="コメント" class="overlay-cmt2">
            </div>
            <div class="wankosoad7-container">
                <img src="./img/wankosoad7.webp" class="product-img">
                <img src="./img/wankoso_1.png" alt="ワン酵素" class="overlay-wankoso">
                <img src="./img/hakko_3.png" alt="発酵" class="overlay-hakko_3">
            </div>
            <div class="wankosoad8-container">
                <img src="./img/wankosoad8.webp" class="product-img">
                <img src="./img/hakko_4.png" alt="発酵" class="overlay-hakko_4">
            </div>
        </div>
    </div>

    <style>
        .lp-wrapper {
            position: relative;
            width: 100%;
            max-width: 750px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .fv-container {
            position: relative;
            width: 100%;
        }

        /* 背景画像：幅100%・高さは画像に合わせて自動 */
        .fv-img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* フェードインアニメーション（初回のみ） */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }



        /* award1：左上 */
        .overlay-img1 {
            position: absolute;
            top: 15%;
            left: 4%;
            width: 27%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            animation: fadeIn 1s ease 0.5s both;
        }

        /* award2：award1の右隣 */
        .overlay-img2 {
            position: absolute;
            top: 15%;
            left: 30%;
            width: 27%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            animation:
                fadeIn 1s ease 0.5s both;
        }

        /* hagumi：スクロールフェードイン（初期状態：非表示） */
        .overlay-img3 {
            position: absolute;
            top: 70%;
            left: 78%;
            width: 21%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            animation:
                fadeIn 1s ease 1.5s both;
        }

        /* CVボタン用の鼓動（パルス）アニメーション */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
                /* 少し大きくなる */
            }

            100% {
                transform: scale(1);
            }
        }

        .cvbtn {
            position: absolute;
            top: 87%;
            left: 5%;
            width: 90%;
            /* 横幅を 660px に調整（お好みで調整してください） */
            height: auto;
            z-index: 10;
            transform-origin: center;
            /* 拡大縮小の基準点を中央に */
            /* 読み込み時にフェードインし、1秒後からループで脈打つアニメーションを開始 */
            animation:
                pulse 2s ease-in-out 1s infinite;
        }

        .cvbtn img {
            width: 100%;
            height: auto;
            display: block;
        }


        .product-container {
            position: relative;
            width: 100%;
        }

        .product-img {
            display: block;
            width: 100%;
            height: auto;
        }

        .wankosoad3-container {
            position: relative;
            width: 100%;
        }

        .overlay-omoi {
            position: absolute;
            top: 2%;
            left: 5%;
            width: 90%;

        }

        .wankosoad5-container {
            position: relative;
            width: 100%;
        }

        .overlay-hakko {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 85%;
            /* 横幅は適宜調整してください */
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 0.5s, transform 1.2s ease;
        }

        .overlay-hakko.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .overlay-cmt1 {
            position: absolute;
            top: 72.5%;
            left: 12%;
            width: 23%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease 1s, transform 1.2s ease;
        }

        .overlay-cmt1.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .overlay-cmt2 {
            position: absolute;
            top: 70%;
            left: 62%;
            width: 23%;
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            /* cmt2は少し遅れてふわっと表示されるようにディレイを設定 */
            transition: opacity 1.2s ease 2s, transform 1.2s ease 0.3s;
        }

        .overlay-cmt2.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .overlay-hakko_3 {
            position: absolute;
            top: 82%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 90%;
            /* 横幅は適宜調整してください */
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 3s, transform 1.2s ease;
        }

        .overlay-hakko_3.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .overlay-wankoso {
            position: absolute;
            top: 82.5%;
            left: 66%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 85%;
            /* 横幅は適宜調整してください */
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 2s, transform 1.2s ease;
        }

        .overlay-wankoso.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .overlay-hakko_4 {
            position: absolute;
            top: 91%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 20px));
            width: 90%;
            /* 横幅は適宜調整してください */
            height: auto;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease 0.5s, transform 1.2s ease;
        }

        .overlay-hakko_4.is-visible {
            opacity: 1;
            transform: translate(-50%, -50%);
        }
    </style>

    <script>
        // hagumi（overlay-img3）スクロールフェードイン
        // ※ scrollイベント方式：実際にスクロールしたときだけ発火
        var img3 = document.querySelector('.overlay-img3');

        if (img3) {
            function checkImg3() {
                var rect = img3.getBoundingClientRect();
                // 要素の上端が画面下端より上に入ったら表示
                if (rect.top < window.innerHeight - 40) {
                    img3.classList.add('is-visible');
                    window.removeEventListener('scroll', checkImg3);
                }
            }
            // scrollしたときだけチェック（読み込み時は発火しない）
            window.addEventListener('scroll', checkImg3, { passive: true });
        }

        // omoi_txt（overlay-omoi）スクロールフェードイン
        var omoi = document.querySelector('.overlay-omoi');

        if (omoi) {
            function checkOmoi() {
                var rect = omoi.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    omoi.classList.add('is-visible');
                    window.removeEventListener('scroll', checkOmoi);
                }
            }
            window.addEventListener('scroll', checkOmoi, { passive: true });
        }

        // hakko（overlay-hakko）スクロールフェードイン
        var hakko = document.querySelector('.overlay-hakko');

        if (hakko) {
            function checkHakko() {
                var rect = hakko.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    hakko.classList.add('is-visible');
                    window.removeEventListener('scroll', checkHakko);
                }
            }
            window.addEventListener('scroll', checkHakko, { passive: true });
        }

        // cmt1 & cmt2スクロールフェードイン
        var cmt1 = document.querySelector('.overlay-cmt1');
        var cmt2 = document.querySelector('.overlay-cmt2');

        if (cmt1 || cmt2) {
            function checkCmts() {
                var target = cmt1 || cmt2;
                var rect = target.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    if (cmt1) cmt1.classList.add('is-visible');
                    if (cmt2) cmt2.classList.add('is-visible');
                    window.removeEventListener('scroll', checkCmts);
                }
            }
            window.addEventListener('scroll', checkCmts, { passive: true });
        }

        // hakko_3 & wankoso スクロールフェードイン
        var hakko3 = document.querySelector('.overlay-hakko_3');
        var wankoso = document.querySelector('.overlay-wankoso');

        if (hakko3 || wankoso) {
            function checkWanko7() {
                var target = hakko3 || wankoso;
                var rect = target.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    if (hakko3) hakko3.classList.add('is-visible');
                    if (wankoso) wankoso.classList.add('is-visible');
                    window.removeEventListener('scroll', checkWanko7);
                }
            }
            window.addEventListener('scroll', checkWanko7, { passive: true });
        }

        // hakko_4 スクロールフェードイン
        var hakko4 = document.querySelector('.overlay-hakko_4');

        if (hakko4) {
            function checkHakko4() {
                var rect = hakko4.getBoundingClientRect();
                if (rect.top < window.innerHeight - 40) {
                    hakko4.classList.add('is-visible');
                    window.removeEventListener('scroll', checkHakko4);
                }
            }
            window.addEventListener('scroll', checkHakko4, { passive: true });
        }
    </script>
</body>
