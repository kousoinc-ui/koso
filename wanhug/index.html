<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わん酵素 特別体験モニター</title>
    <style>
        /* --- 基本ベース・スマホ最適化 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fcf9f5;
            /* ぬくもりのある背景色 */
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
        }

        .lp-wrapper {
            position: relative;
            width: 100%;
            max-width: 750px;
            margin: 0 auto;
            overflow-x: hidden;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* --- 共通スクロールフェードインアニメーション（バグ修正版） --- */
        .scroll-fade {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.0s cubic-bezier(0.215, 0.610, 0.355, 1.000),
                transform 1.0s cubic-bezier(0.215, 0.610, 0.355, 1.000);
        }

        .scroll-fade.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- ファーストビュー（FV） --- */
        .fv-container {
            position: relative;
            width: 100%;
        }

        @keyframes fvFadeIn {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .overlay-img1 {
            position: absolute;
            top: 15%;
            left: 4%;
            width: 27%;
            animation: fvFadeIn 0.8s ease 0.3s both;
        }

        .overlay-img2 {
            position: absolute;
            top: 15%;
            left: 30%;
            width: 27%;
            animation: fvFadeIn 0.8s ease 0.6s both;
        }

        .overlay-img3 {
            position: absolute;
            top: 70%;
            left: 75%;
            width: 21%;
            animation: fvFadeIn 0.8s ease 1.2s both;
        }

        /* --- 購入フローティングボタン（パルスアニメーション） --- */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        .cvbtn {
            position: absolute;
            top: 87%;
            left: 5%;
            width: 90%;
            z-index: 10;
            animation: pulse 2.3s ease-in-out infinite;
        }

        /* --- 各セクション・コンテナ --- */
        .product-container {
            position: relative;
            width: 100%;
        }

        .relative-box {
            position: relative;
            width: 100%;
        }

        /* 想い・発酵等の配置微調整（絶対配置） */
        .overlay-omoi {
            position: absolute;
            top: 2%;
            left: 5%;
            width: 90%;
        }

        .overlay-hakko {
            position: absolute;
            top: 30%;
            left: 10%;
            width: 80%;
        }

        .overlay-cmt1 {
            position: absolute;
            top: 72.5%;
            left: 4%;
            width: 28%;
        }

        .overlay-cmt2 {
            position: absolute;
            top: 50%;
            left: 62%;
            width: 29%;
        }

        .overlay-hakko_2 {
            position: absolute;
            top: 10%;
            left: 20%;
            width: 60%;
        }

        .overlay-wankoso {
            position: absolute;
            top: 40%;
            left: 8%;
            width: 85%;
        }

        .overlay-hakko_3 {
            position: absolute;
            top: 75%;
            left: 5%;
            width: 90%;
        }

        .overlay-hakko_4 {
            position: absolute;
            top: 15%;
            left: 5%;
            width: 90%;
        }

        /* --- コだわり2：犬が飲むGIFのコンテナ --- */
        .point2-wrap {
            position: relative;
            width: 100%;
        }

        .overlay-gif-drink {
            position: absolute;
            top: 33%;
            left: 19%;
            width: 60%;
            border-radius: 8px;
            /* カドをほんのり丸くして美しく */
        }

        /* --- こだわり3：素材の時間差フェードイン --- */
        .point3-wrap {
            position: relative;
            width: 100%;
        }

        .overlay-point3_1 {
            position: absolute;
            top: 23%;
            left: 5%;
            width: 90%;
        }

        .overlay-point3_2 {
            position: absolute;
            top: 48%;
            left: 5%;
            width: 90%;
        }

        .overlay-point3_3 {
            position: absolute;
            top: 74%;
            left: 5%;
            width: 90%;
        }

        /* 時間差（ディレイ）の指定 */
        .point3-wrap .overlay-point3_1.is-visible {
            transition-delay: 0.1s;
        }

        .point3-wrap .overlay-point3_2.is-visible {
            transition-delay: 0.4s;
        }

        .point3-wrap .overlay-point3_3.is-visible {
            transition-delay: 0.7s;
        }

        /* --- お届けステップ・レビュー --- */
        .overlay-step {
            position: absolute;
            top: 35%;
            left: 12%;
            width: 75%;
        }

        .overlay-review_top {
            position: absolute;
            top: 5%;
            left: 12%;
            width: 75%;
        }

        .overlay-review_1 {
            position: absolute;
            top: 45%;
            left: 23%;
            width: 53%;
        }

        /* --- 下部CVエリア --- */
        .cvbtn_2 {
            position: absolute;
            top: 79%;
            left: 5%;
            width: 90%;
            animation: pulse 2.3s ease-in-out infinite;
        }
    </style>
</head>

<body>

            </div>

            <div class="fv-container">

                <img src="./img/award1.png" alt="makuake350%達成" class="overlay-img1">

            <div class="relative-box">
                <img src="./img/wankosoad10.webp" class="product-img" alt="レビュー背景">

            <div class="relative-box">

            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var fadeElements = document.querySelectorAll('.scroll-fade');

            // スマホの電池やメモリに優しい「IntersectionObserver」を採用
            var observer = new IntersectionObserver(function (entries, observer) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target); // 1回表示されたら監視を終了して軽量化
                    }
                });
            }, {
                rootMargin: '0px 0px -40px 0px' // 画面の下端から40px上がってきたらフェードイン
            });

            fadeElements.forEach(function (el) {
                observer.observe(el);
            });
        });
    </script>
</body>

</html>
